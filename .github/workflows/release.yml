name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build Tauri app
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create portable zip
        run: |
          $dist = "src-tauri\target\release"
          Compress-Archive -Path "$dist\bangumini.exe" -DestinationPath "$dist\Bangumini_portable.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Bangumini ${{ github.ref_name }}"
          body: |
            ## 安装
            - **Bangumini_*_x64_en-US.msi** — Windows 安装包（推荐）
            - **Bangumini_*_x64-setup.exe** — exe 安装器
            - **Bangumini_portable.zip** — 免安装便携版（解压即用，需要系统已安装 WebView2）
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/Bangumini_portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
