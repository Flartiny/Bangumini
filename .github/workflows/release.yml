name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Install WiX Toolset
        run: choco install wixtoolset -y --no-progress

      - name: Build Tauri app
        run: npm run tauri build -- --bundles msi,nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Debug bundle output
        run: |
          Get-ChildItem -Recurse src-tauri\target\release\bundle -ErrorAction SilentlyContinue || echo "No bundle dir found"

      - name: Generate latest.json for updater
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $nsisExe = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem "src-tauri\target\release\bundle\nsis\*-setup.exe.sig" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($nsisExe -and $nsisSig) {
            $sigContent = Get-Content $nsisSig.FullName -Raw
            $latest = @{
              version = "v$version"
              notes = "See the release page for changelog."
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                "windows-x86_64" = @{
                  signature = $sigContent
                  url = "https://github.com/Flartiny/Bangumini/releases/download/v$version/$($nsisExe.Name)"
                }
              }
            }
            $latest | ConvertTo-Json -Depth 3 | Out-File -Encoding utf8 src-tauri\target\release\latest.json
            Write-Host "latest.json generated"
          } else {
            Write-Host "Updater artifacts not found. Check createUpdaterArtifacts config."
          }

      - name: Create portable zip
        run: |
          $dist = "src-tauri\target\release"
          Compress-Archive -Path "$dist\bangumini.exe" -DestinationPath "$dist\Bangumini_portable.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Bangumini ${{ github.ref_name }}"
          body: |
            ## 安装
            - **Bangumini_*_x64_en-US.msi** — Windows 安装包
            - **Bangumini_*_x64-setup.exe** — exe 安装器
            - **Bangumini_portable.zip** — 免安装便携版
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/Bangumini_portable.zip
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi.sig
            src-tauri/target/release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
